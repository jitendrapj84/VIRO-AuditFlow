<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRO AuditFlow Portal</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
    }
    body { 
      background: #f4f7f6; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      color: #333;
      padding: 40px 20px;
    }
    .container { 
      text-align: center; 
      width: 100%;
      max-width: 1200px; 
    }
    h1 { 
      margin-bottom: 10px; 
      font-size: 2.8rem; 
      color: #1a1a1a; 
      font-weight: 700;
    }
    p.subtitle { 
      color: #666; 
      margin-bottom: 50px;
      font-size: 1.1rem;
    }
    .portal-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 30px; 
      width: 100%;
    }
    .portal-card { 
      background: white; 
      padding: 40px 30px; 
      border-radius: 16px; 
      text-decoration: none; 
      color: inherit; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
      transition: all 0.3s ease; 
      border: 1px solid #e1e8e6;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .portal-card:hover { 
      transform: translateY(-8px); 
      box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
      border-color: #0070f3; 
    }
    .portal-card h2 { 
      font-size: 1.6rem; 
      margin-bottom: 15px; 
      color: #0070f3; 
    }
    .portal-card p {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VIRO AuditFlow</h1>
    <p class="subtitle">Select an application to launch</p>
    
    <div class="portal-grid">
      <a href="https://viro-toc.vercel.app/" class="portal-card" target="_blank">
        <h2>VIRO TOC</h2>
        <p>Click to open the VIRO TOC application tool.</p>
      </a>

      <a href="https://viro-mus.vercel.app/" class="portal-card" target="_blank">
        <h2>VIRO MUS</h2>
        <p>Click to open the VIRO MUS application tool.</p>
      </a>

      <a href="https://viro-osp.vercel.app/" class="portal-card" target="_blank">
        <h2>VIRO OSP</h2>
        <p>Click to open the VIRO OSP application tool.</p>
      </a>
    </div>
  </div>
</body>
</html>
