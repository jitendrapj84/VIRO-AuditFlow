<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRO App Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
    .container { text-align: center; max-width: 800px; padding: 20px; }
    h1 { margin-bottom: 10px; font-size: 2.5rem; color: #1a1a1a; }
    p { color: #666; margin-bottom: 40px; }
    .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .portal-card { background: white; padding: 30px; border-radius: 12px; text-decoration: none; color: inherit; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #e1e8e6; }
    .portal-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: #0070f3; }
    .portal-card h2 { font-size: 1.5rem; margin-bottom: 10px; color: #0070f3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VIRO Workspace</h1>
    <p>Select an application to launch</p>
    <div class="portal-grid">
      <a href="https://viro-mus.vercel.app/" class="portal-card" target="_blank">
        <h2>VIRO MUS</h2>
        <p>Click to open the VIRO MUS application tool.</p>
      </a>
      <a href="https://viro-toc.vercel.app/" class="portal-card" target="_blank">
        <h2>VIRO TOC</h2>
        <p>Click to open the VIRO TOC application tool.</p>
      </a>
    </div>
  </div>
</body>
</html>
